{{- if .Values.registry.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spore-registry
  labels:
    app.kubernetes.io/name: spore-registry
    {{- include "sporevm-k8s.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: spore-registry
      app.kubernetes.io/part-of: sporevm-k8s
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spore-registry
        app.kubernetes.io/part-of: sporevm-k8s
    spec:
      automountServiceAccountToken: false
      containers:
        - name: registry
          image: "{{ .Values.registry.image.repository }}:{{ .Values.registry.image.tag }}"
          imagePullPolicy: {{ .Values.registry.image.pullPolicy }}
          ports:
            - name: https
              containerPort: {{ .Values.registry.service.port }}
          env:
            - name: REGISTRY_HTTP_ADDR
              value: :{{ .Values.registry.service.port }}
            - name: REGISTRY_HTTP_TLS_CERTIFICATE
              value: /certs/tls.crt
            - name: REGISTRY_HTTP_TLS_KEY
              value: /certs/tls.key
            - name: REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY
              value: /var/lib/registry
          readinessProbe:
            httpGet:
              scheme: HTTPS
              path: /v2/
              port: https
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              scheme: HTTPS
              path: /v2/
              port: https
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.registry.resources | nindent 12 }}
          volumeMounts:
            - name: registry-data
              mountPath: /var/lib/registry
            - name: registry-tls
              mountPath: /certs
              readOnly: true
      volumes:
        - name: registry-data
          persistentVolumeClaim:
            claimName: spore-registry-data
        - name: registry-tls
          secret:
            secretName: {{ .Values.registry.tlsSecretName }}
{{- end }}
