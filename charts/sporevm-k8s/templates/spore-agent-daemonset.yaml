{{- if .Values.agent.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: spore-agent
  labels:
    app.kubernetes.io/name: spore-agent
    {{- include "sporevm-k8s.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: spore-agent
      app.kubernetes.io/part-of: sporevm-k8s
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spore-agent
        app.kubernetes.io/part-of: sporevm-k8s
    spec:
      serviceAccountName: {{ include "sporevm-k8s.agentServiceAccountName" . }}
      automountServiceAccountToken: false
      nodeSelector:
        {{- toYaml .Values.agent.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.agent.tolerations | nindent 8 }}
      containers:
        - name: agent
          image: "{{ .Values.agent.image.repository }}:{{ .Values.agent.image.tag }}"
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.agent.service.port }}
          securityContext:
            {{- toYaml .Values.agent.securityContext | nindent 12 }}
          command:
            {{- if .Values.agent.registryCA.enabled }}
            - /bin/sh
            - -ec
            - |-
              if [ -f /etc/sporevm-registry-ca/ca.crt ]; then
                cp /etc/sporevm-registry-ca/ca.crt /usr/local/share/ca-certificates/spore-registry-ca.crt
                update-ca-certificates >/dev/null 2>&1
              fi
              exec /usr/local/bin/spore-agent "$@"
            - --
            {{- else }}
            - /usr/local/bin/spore-agent
            {{- end }}
          args:
            - --listen=:{{ .Values.agent.service.port }}
            - --agent-id=$(POD_NAME)
            - --cell-id={{ .Values.agent.cellID }}
            - --slots={{ .Values.agent.slots }}
            - --spore-path={{ .Values.agent.sporePath }}
            - --result-store-root={{ .Values.agent.cache.resultDir }}
            - --result-store-backend={{ .Values.agent.resultStore.backend }}
            {{- if .Values.agent.resultStore.region }}
            - --result-store-region={{ .Values.agent.resultStore.region }}
            {{- end }}
            {{- if .Values.agent.resultStore.endpoint }}
            - --result-store-endpoint={{ .Values.agent.resultStore.endpoint }}
            {{- end }}
            - --result-store-path-style={{ .Values.agent.resultStore.pathStyle }}
            - --work-root={{ .Values.agent.cache.workDir }}
            - --bundle-cache-root={{ .Values.agent.cache.bundleDir }}
            - --rootfs-cache-root={{ .Values.agent.cache.rootfsDir }}
            - --template-retain={{ .Values.agent.cache.templateRetain }}
            - --template-reconcile-interval={{ .Values.agent.cache.templateReconcileInterval }}
            - --reset-runtime-on-start=true
            {{- if .Values.agent.region }}
            - --region={{ .Values.agent.region }}
            {{- end }}
            - --backend={{ .Values.agent.backend }}
            {{- if .Values.agent.childTimeout }}
            - --child-timeout={{ .Values.agent.childTimeout }}
            {{- end }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SPOREVM_RUNTIME_DIR
              value: {{ printf "%s/runtime" .Values.agent.cache.workDir | quote }}
            - name: SPOREVM_KERNEL_CACHE_DIR
              value: {{ .Values.agent.cache.kernelDir | quote }}
            - name: SPOREVM_BUNDLE_CACHE_DIR
              value: {{ .Values.agent.cache.bundleDir | quote }}
            - name: SPOREVM_ROOTFS_CACHE_DIR
              value: {{ .Values.agent.cache.rootfsDir | quote }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
          volumeMounts:
            - name: kvm
              mountPath: /dev/kvm
            - name: sporevm-var
              mountPath: {{ .Values.agent.cache.mountPath }}
            {{- if .Values.agent.registryCA.enabled }}
            - name: spore-registry-ca
              mountPath: /etc/sporevm-registry-ca
              readOnly: true
            {{- end }}
      volumes:
        - name: kvm
          hostPath:
            path: {{ .Values.agent.kvm.hostPath }}
            type: CharDevice
        - name: sporevm-var
          hostPath:
            path: {{ .Values.agent.cache.hostPath }}
            type: DirectoryOrCreate
        {{- if .Values.agent.registryCA.enabled }}
        - name: spore-registry-ca
          secret:
            secretName: {{ .Values.agent.registryCA.secretName }}
            optional: true
        {{- end }}
{{- end }}
