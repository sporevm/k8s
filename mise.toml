[tools]
go = "1.26.3"
helm = "3.19.0"

[tasks."fleet:contracts:test"]
description = "Validate fleet contract examples and invariants"
run = "python3 scripts/validate_fleet_contracts.py && python3 -m unittest discover -s tests -p '*_test.py'"

[tasks."fleet:go:test"]
description = "Run Go fleet coordinator and agent tests"
run = "go test ./..."

[tasks."fleet:benchmark:synthetic"]
description = "Run the synthetic 1,000-child coordinator benchmark harness"
run = "go run ./cmd/spore-fleet-benchmark --bundle-run examples/fleet/bundle-run-1000.json --agents 10 --slots-per-agent 100 --target-concurrency 1000"

[tasks."fleet:benchmark:computesdk"]
description = "Run the live ComputeSDK-shaped sequential TTI benchmark against the current Kubernetes context"
run = "python3 scripts/computesdk_sporevm_benchmark.py"

[tasks."dev:runtime-probe"]
description = "Run a dev-only live runtime probe with local arm64 binaries in a temporary privileged pod"
run = "scripts/dev_runtime_probe.sh"

[tasks."runtime:image:build"]
description = "Build the arm64 SporeVM Kubernetes runtime image with SporeVM 0.11.0"
run = "docker buildx build --platform linux/arm64 -t sporevm-k8s-runtime:dev ."

[tasks."runtime:image:push"]
description = "Build and push the arm64 runtime image to SPOREVM_K8S_RUNTIME_IMAGE"
run = "docker buildx build --platform linux/arm64 -t \"$SPOREVM_K8S_RUNTIME_IMAGE\" --push ."

[tasks."chart:lint"]
description = "Lint the public Helm chart"
run = "helm lint charts/sporevm-k8s"

[tasks."chart:package"]
description = "Package the public Helm chart"
run = "mkdir -p dist/charts && helm package charts/sporevm-k8s --destination dist/charts"

[tasks."chart:publish"]
description = "Package and push the public Helm chart to GHCR OCI"
run = "set -eu; mkdir -p dist/charts; helm package charts/sporevm-k8s --destination dist/charts; chart_version=$(sed -n 's/^version: //p' charts/sporevm-k8s/Chart.yaml); helm push \"dist/charts/sporevm-k8s-${chart_version}.tgz\" oci://ghcr.io/sporevm/charts"

[tasks."public:leak-scan"]
description = "Check for private infrastructure details before publishing"
run = "scripts/public_leak_scan.sh"

[tasks."fleet:test"]
description = "Run all fleet contract and Go tests"
run = "mise run fleet:contracts:test && mise run fleet:go:test && mise run chart:lint"
