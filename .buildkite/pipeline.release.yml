steps:
  - label: ":package: Publish"
    key: "publish"
    secrets:
      - SPOREVM_GITHUB_TOKEN
    command: |
      set -euo pipefail
      if ! command -v mise >/dev/null 2>&1; then
        curl https://mise.run | sh
        export PATH="$$HOME/.local/bin:$$HOME/.mise/bin:$$PATH"
      fi
      mise trust -y mise.toml

      version="$${BUILDKITE_TAG#v}"
      chart_version="$(sed -n 's/^version: //p' charts/sporevm-k8s/Chart.yaml)"
      if [ "$$version" != "$$chart_version" ]; then
        echo "Chart version $$chart_version does not match tag $$BUILDKITE_TAG" >&2
        exit 1
      fi

      ghcr_user="$${SPOREVM_K8S_GITHUB_USER:-sporevm}"
      echo "$$SPOREVM_GITHUB_TOKEN" | docker login ghcr.io --username "$$ghcr_user" --password-stdin
      echo "$$SPOREVM_GITHUB_TOKEN" | helm registry login ghcr.io --username "$$ghcr_user" --password-stdin

      export SPOREVM_K8S_RUNTIME_IMAGE="ghcr.io/sporevm/k8s-runtime:$$version"
      mise run runtime:image:push
      mise run chart:publish
