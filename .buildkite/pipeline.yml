env:
  MISE_YES: "1"

steps:
  - label: ":test_tube: Tests"
    key: "tests"
    command: |
      set -euo pipefail
      if ! command -v mise >/dev/null 2>&1; then
        curl https://mise.run | sh
        export PATH="$$HOME/.local/bin:$$HOME/.mise/bin:$$PATH"
      fi
      mise trust -y mise.toml
      mise run fleet:test
      mise run public:leak-scan

  - wait

  - label: ":pipeline: Release"
    key: "release-upload"
    command: |
      set -euo pipefail
      if [ -z "$$BUILDKITE_TAG" ]; then
        echo "Not a tag build; skipping release"
        exit 0
      fi
      buildkite-agent pipeline upload .buildkite/pipeline.release.yml
