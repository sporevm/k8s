apiVersion: batch/v1
kind: Job
metadata:
  name: cluster-bootstrap-smoke
  namespace: sporevm-system
  labels:
    app.kubernetes.io/name: cluster-bootstrap-smoke
    app.kubernetes.io/part-of: sporevm-k8s
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cluster-bootstrap-smoke
        app.kubernetes.io/part-of: sporevm-k8s
    spec:
      restartPolicy: Never
      containers:
        - name: smoke
          image: public.ecr.aws/docker/library/busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              echo "sporevm-k8s-bootstrap-ok"
              nslookup kubernetes.default.svc.cluster.local
