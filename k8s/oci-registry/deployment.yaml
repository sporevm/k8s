apiVersion: apps/v1
kind: Deployment
metadata:
  name: spore-registry
  namespace: sporevm-system
  labels:
    app.kubernetes.io/name: spore-registry
    app.kubernetes.io/part-of: sporevm-k8s
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: spore-registry
      app.kubernetes.io/part-of: sporevm-k8s
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spore-registry
        app.kubernetes.io/part-of: sporevm-k8s
    spec:
      automountServiceAccountToken: false
      containers:
        - name: registry
          image: public.ecr.aws/docker/library/registry:2
          imagePullPolicy: IfNotPresent
          ports:
            - name: https
              containerPort: 5000
          env:
            - name: REGISTRY_HTTP_ADDR
              value: :5000
            - name: REGISTRY_HTTP_TLS_CERTIFICATE
              value: /certs/tls.crt
            - name: REGISTRY_HTTP_TLS_KEY
              value: /certs/tls.key
            - name: REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY
              value: /var/lib/registry
          readinessProbe:
            httpGet:
              scheme: HTTPS
              path: /v2/
              port: https
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              scheme: HTTPS
              path: /v2/
              port: https
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: registry-data
              mountPath: /var/lib/registry
            - name: registry-tls
              mountPath: /certs
              readOnly: true
      volumes:
        - name: registry-data
          persistentVolumeClaim:
            claimName: spore-registry-data
        - name: registry-tls
          secret:
            secretName: spore-registry-tls
