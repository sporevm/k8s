apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: spore-agent
  namespace: sporevm-system
  labels:
    app.kubernetes.io/name: spore-agent
    app.kubernetes.io/part-of: sporevm-k8s
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: spore-agent
      app.kubernetes.io/part-of: sporevm-k8s
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spore-agent
        app.kubernetes.io/part-of: sporevm-k8s
    spec:
      serviceAccountName: spore-agent
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/arch: arm64
        sporevm.io/agent: "true"
        sporevm.io/arch: aarch64
        sporevm.io/backend: kvm
      tolerations:
        - key: sporevm.io/agent
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: agent
          image: sporevm-k8s-runtime:sporevm-1.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
          command:
            - /usr/local/bin/spore-agent
          args:
            - --listen=:8080
            - --agent-id=$(POD_NAME)
            - --cell-id=default
            - --slots=1
            - --spore-path=/usr/local/bin/spore
            - --result-store-root=/var/lib/sporevm/results
            - --work-root=/var/lib/sporevm/work
            - --bundle-cache-root=/var/lib/sporevm/bundle-cache
            - --rootfs-cache-root=/var/lib/sporevm/rootfs-cache
            - --backend=kvm
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SPOREVM_KERNEL_CACHE_DIR
              value: /var/lib/sporevm/kernels
            - name: SPOREVM_BUNDLE_CACHE_DIR
              value: /var/lib/sporevm/bundle-cache
            - name: SPOREVM_ROOTFS_CACHE_DIR
              value: /var/lib/sporevm/rootfs-cache
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: kvm
              mountPath: /dev/kvm
            - name: sporevm-var
              mountPath: /var/lib/sporevm
      volumes:
        - name: kvm
          hostPath:
            path: /dev/kvm
            type: CharDevice
        - name: sporevm-var
          hostPath:
            path: /var/lib/sporevm
            type: DirectoryOrCreate
